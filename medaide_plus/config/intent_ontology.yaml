# MedAide+ Intent Ontology
# 4 Categories × 18 Intents (MedAide+ extends original MedAide's 17 with Follow_up_Scheduling)

ontology:
  Pre-Diagnosis:
    id: 0
    description: "Queries related to understanding symptoms and health concerns before diagnosis"
    intents:
      Symptom_Triage:
        id: 0
        description: "Initial assessment and prioritization of reported symptoms"
        keywords: ["symptom", "feel", "pain", "ache", "hurt", "discomfort", "problem"]
        severity_levels: ["mild", "moderate", "severe", "emergency"]
      Department_Suggestion:
        id: 1
        description: "Recommending the appropriate medical department or specialist"
        keywords: ["which doctor", "department", "specialist", "whom to consult", "see a doctor"]
      Risk_Assessment:
        id: 2
        description: "Evaluating patient risk factors for health conditions"
        keywords: ["risk", "chance", "probability", "likelihood", "predisposition", "susceptible"]
      Health_Inquiry:
        id: 3
        description: "General health questions and wellness inquiries"
        keywords: ["what is", "explain", "tell me about", "health", "normal", "healthy", "wellness"]

  Diagnosis:
    id: 1
    description: "Queries related to identifying and understanding medical conditions"
    intents:
      Symptom_Analysis:
        id: 4
        description: "Detailed analysis of symptoms to understand underlying conditions"
        keywords: ["analyze", "assess", "evaluate", "what does it mean", "symptom combination"]
      Etiology_Detection:
        id: 5
        description: "Identifying causes and origins of medical conditions"
        keywords: ["cause", "why", "reason", "origin", "trigger", "what causes"]
      Test_Interpretation:
        id: 6
        description: "Explaining and interpreting medical test results"
        keywords: ["test result", "lab report", "blood test", "imaging", "biopsy", "interpretation", "what does my result"]
      Differential_Diagnosis:
        id: 7
        description: "Distinguishing between possible diagnoses given symptom profiles"
        keywords: ["could be", "possible diagnoses", "differential", "rule out", "distinguish"]

  Medication:
    id: 2
    description: "Queries related to medications and pharmaceutical treatments"
    intents:
      Drug_Counseling:
        id: 8
        description: "Guidance about medications, their use, and effects"
        keywords: ["medication", "drug", "medicine", "pill", "tablet", "capsule", "prescription"]
      Dosage_Recommendation:
        id: 9
        description: "Advice on appropriate medication dosages"
        keywords: ["dose", "dosage", "how much", "how many", "frequency", "when to take", "how to take"]
      Contraindication_Check:
        id: 10
        description: "Identifying situations where medications should not be used"
        keywords: ["contraindication", "avoid", "should not take", "forbidden", "allergy", "adverse"]
      Drug_Interaction:
        id: 11
        description: "Checking for potential interactions between medications"
        keywords: ["interaction", "combine", "together with", "mix", "concurrent", "multiple medications"]
      Prescription_Review:
        id: 12
        description: "Reviewing and validating existing prescription regimens"
        keywords: ["prescription", "review", "check my medication", "current meds", "regimen", "treatment plan"]

  Post-Diagnosis:
    id: 3
    description: "Queries related to care and management after diagnosis"
    intents:
      Rehabilitation_Advice:
        id: 13
        description: "Guidance on recovery and rehabilitation processes"
        keywords: ["rehabilitation", "recovery", "physical therapy", "exercise", "recover", "healing"]
      Progress_Tracking:
        id: 14
        description: "Monitoring and tracking patient progress over time"
        keywords: ["progress", "improvement", "getting better", "tracking", "monitor", "follow up"]
      Care_Support:
        id: 15
        description: "Emotional and practical support for ongoing care"
        keywords: ["support", "cope", "manage", "living with", "deal with", "care"]
      Lifestyle_Guidance:
        id: 16
        description: "Advice on lifestyle modifications for health improvement"
        keywords: ["diet", "lifestyle", "exercise", "sleep", "stress", "nutrition", "habit"]
      Follow_up_Scheduling:
        id: 17
        description: "Planning and scheduling follow-up appointments and check-ups"
        keywords: ["appointment", "follow up", "schedule", "next visit", "check up", "when to return"]

# Category-level metadata
categories:
  - name: "Pre-Diagnosis"
    id: 0
    intent_count: 4
    intent_ids: [0, 1, 2, 3]
  - name: "Diagnosis"
    id: 1
    intent_count: 4
    intent_ids: [4, 5, 6, 7]
  - name: "Medication"
    id: 2
    intent_count: 5
    intent_ids: [8, 9, 10, 11, 12]
  - name: "Post-Diagnosis"
    id: 3
    intent_count: 5
    intent_ids: [13, 14, 15, 16, 17]
